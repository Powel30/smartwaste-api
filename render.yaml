# render.yaml  — deploy to Render.com (free tier)
# Push this file to your GitHub repo, then connect it on render.com

services:
  - type: web
    name: smartwaste-api
    runtime: python
    buildCommand: |
      "pip install -r requirements.txt && python train_model.py"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MODEL_PATH
        value: waste_model.pkl
    autoDeploy: true
